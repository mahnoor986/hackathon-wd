<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <!-- NAV-BAR START  -->

    <header class="text-gray-600 body-font">
        <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
            <a class="flex title-font font-medium items-center text-gray-900 mb-4 md:mb-0">
                <img src="./images/Logo.svg" alt="logo">
            </a>
            <nav class="md:ml-auto md:mr-auto flex flex-wrap items-center text-base justify-center">
                <a class="mr-5 list text-purple-500 hover:text-gray-900">Home</a>
                <a class="mr-5 list hover:text-gray-900">Portfolio</a>
                <a class="mr-5 list hover:text-gray-900">About me</a>
                <a class="mr-5 list hover:text-gray-900">Testimonials</a>
            </nav>
            <button
                class="inline-flex list items-center bg-white border-1 border-purple-500 text-purple-500 py-3 px-7 focus:outline-none hover:bg-gray-200 rounded-[5px]  text-base mt-4 md:mt-0">Contact
                Me</button>
        </div>
    </header>

    <!-- NAV-BAR END  -->

    <!-- HERO-SECTION START  -->


    <section class="text-gray-600 body-font">
        <div class="container mx-auto flex px-5 py-24 md:flex-row flex-col items-center">
            <div
                class="lg:flex-grow md:w-1/2 lg:pr-24 md:pr-16 flex flex-col md:items-start md:text-left mb-16 md:mb-0 items-center text-center">
                <p class="different text-gray-900">Hey, Iam John</p>
                <h1 class="title-font sm:text-4xl text-3xl head font-medium text-gray-900">I create <span
                        class="text-purple-500">product design</span>
                </h1>
                <h1 class="title-font sm:text-4xl head text-3xl mb-4 font-medium text-gray-900"> and brand experience
                </h1>
                <p class="para text-gray-900 leading-relaxed">Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                </p>
                <p class="mb-8 para text-gray-900 leading-relaxed">Suspendisse varius enim in eros elementum tristique.
                </p>
                <div class="flex justify-center">
                    <button
                        class="inline-flex text-white bg-purple-500 border-0 py-3 px-7 focus:outline-none hover:bg-purple-500 rounded-[5px] text-lg">Get
                        in Touch</button>
                </div>
            </div>
            <div class="lg:max-w-lg lg:w-full md:w-1/2 w-5/6">
                <img class="object-cover object-center rounded" alt="hero" src="./images/Group 11 1.png">
            </div>
        </div>
    </section>

    <!-- HERO-SECTION END  -->
</body>

</html>
